name: MinGW-w64 Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          
    - name: Update Contributors File
      shell: bash
      run: |
        echo "# Contributors" > CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        echo "Thanks to everyone who has helped with MineSweeperWin32:" >> CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        
        # This pulls all unique committers and formats them as a Markdown list
        git shortlog -sn --all | cut -f2- | sed 's/^/* /' >> CONTRIBUTORS.md
        
        echo "CONTRIBUTORS.md updated from Git history."

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Commit and Push Updated Build Number
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git checkout -B master origin/master
        git pull origin master # Keep it sync'd
        
        git add build_number.txt CONTRIBUTORS.md
        
        if ! git diff --staged --quiet; then
          git commit -m "chore: increment build number for release ${{ github.ref_name }} [skip ci]"
          git push origin master
        fi
        
    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
      run: |
        BASE_TAG=${{ github.ref_name }}
        BUILD_NUM=$(cat build_number.txt)
        FULL_VERSION="${BASE_TAG}.${BUILD_NUM}"
        SHA=$(git rev-parse HEAD)
        
        git tag -d "$BASE_TAG" || true
        git push origin --delete "$BASE_TAG" || true
        
        curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          "https://github.com" \
          -d "{\"ref\":\"refs/tags/$FULL_VERSION\",\"sha\":\"$SHA\"}"
        
        gh release create "$FULL_VERSION" build/MineSweeperWin32.exe \
          --title "MineSweeper $FULL_VERSION" \
          --generate-notes
