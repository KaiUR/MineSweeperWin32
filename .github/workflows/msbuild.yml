name: MinGW-w64 Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up MinGW-w64
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile MineSweeper
      # -lgdi32 and -luser32 link the Windows libraries you
      # -mwindows ensures it builds as a GUI app
      run: |
        gcc -O2 *.c -o MineSweeper.exe -luser32 -lgdi32 -mwindows

    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: MineSweeper.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}