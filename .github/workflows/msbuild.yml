name: MinGW-w64 Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Commit and Push Updated Build Number
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Ensure we are on the master branch to apply the change
        git checkout master
        git pull origin master # Keep it sync'd
        
        git add build_number.txt
        
        if ! git diff --staged --quiet; then
          git commit -m "chore: increment build number for release ${{ github.ref_name }} [skip ci]"
          git push origin master
        fi
        
    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        BASE_TAG=${{ github.ref_name }}
        BUILD_NUM=$(cat build_number.txt)
        
        FULL_VERSION="${BASE_TAG}.${BUILD_NUM}"
        echo "Creating release for $FULL_VERSION"
        
        gh release create "$FULL_VERSION" build/MineSweeperWin32.exe \
          --title "MineSweeper $FULL_VERSION" \
          --generate-notes \
          --target master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
