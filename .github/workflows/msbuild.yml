name: MinGW-w64 Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Import GPG key
      id: import-gpg
      uses: crazy-max/ghaction-import-gpg@v6
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.GPG_PASSPHRASE }}
        git_user_signingkey: true
        git_commit_gpgsign: true

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          
    - name: Update Contributors File
      shell: bash
      run: |
        echo "# Contributors" > CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        echo "Thanks to everyone who has helped with MineSweeperWin32:" >> CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        
        # This pulls all unique committers and formats them as a Markdown list
        git shortlog -sn --all | cut -f2- | sed 's/^/* /' >> CONTRIBUTORS.md
        
        echo "CONTRIBUTORS.md updated from Git history."

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Commit and Push Updated Build Number
      if: startsWith(github.ref, 'refs/tags/v')
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        branch: master
        file_pattern: 'build_number.txt CONTRIBUTORS.md'
        commit_message: "chore: increment build number for release ${{ github.ref_name }} [skip ci]"
        commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
        commit_user_name: ${{ steps.import-gpg.outputs.name }}
        commit_user_email: ${{ steps.import-gpg.outputs.email }}
        commit_options: '--gpg-sign=${{ steps.import-gpg.outputs.keyid }}'
        
    - name: Create Signed Tag and Release
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      shell: bash
      run: |
        BASE_TAG=${{ github.ref_name }}
        BUILD_NUM=$(cat build_number.txt)
        FULL_VERSION="${BASE_TAG}.${BUILD_NUM}"
        
        git config --global gpg.program "gpg --batch --pinentry-mode loopback"
        
        git tag -d "$BASE_TAG" || true
        git push origin --delete "$BASE_TAG" || true

        echo "$GPG_PASSPHRASE" | git tag -s "$FULL_VERSION" -m "Release $FULL_VERSION"
        git push origin "$FULL_VERSION"
        
        echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV

    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        BASE_TAG=${{ github.ref_name }}
        BUILD_NUM=$(cat build_number.txt)
        FULL_VERSION="${BASE_TAG}.${BUILD_NUM}"
        
        git config --global gpg.program "gpg --batch --pinentry-mode loopback"
        
        git tag -d "$BASE_TAG" || true
        git push origin --delete "$BASE_TAG" || true

        echo "$GPG_PASSPHRASE" | git tag -s "$FULL_VERSION" -m "Release $FULL_VERSION"
        git push origin "$FULL_VERSION"
        
        gh release create "$FULL_VERSION" build/MineSweeperWin32.exe \
          --title "MineSweeper $FULL_VERSION" \
          --generate-notes
