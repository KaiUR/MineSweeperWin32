name: MinGW-w64 Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Import GPG key
      id: import-gpg
      uses: crazy-max/ghaction-import-gpg@v6
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.GPG_PASSPHRASE }}
        git_user_signingkey: true
        git_commit_gpgsign: true

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          
    - name: Update Contributors File
      shell: bash
      run: |
        echo "# Contributors" > CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        echo "Thanks to everyone who has helped with MineSweeperWin32:" >> CONTRIBUTORS.md
        echo "" >> CONTRIBUTORS.md
        
        # This pulls all unique committers and formats them as a Markdown list
        git shortlog -sn --all | cut -f2- | sed 's/^/* /' >> CONTRIBUTORS.md
        
        echo "CONTRIBUTORS.md updated from Git history."

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Commit and Push Updated Build Number
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        git config --global user.name "${{ steps.import-gpg.outputs.name }}"
        git config --global user.email "${{ steps.import-gpg.outputs.email }}"
        git config --global user.signingkey "${{ steps.import-gpg.outputs.keyid }}"

        git config --global gpg.program "gpg --batch --pinentry-mode loopback"
        git config --global commit.gpgsign true
        
        git checkout -B master origin/master
        git pull origin master
        
        git add build_number.txt CONTRIBUTORS.md
        
        if ! git diff --staged --quiet; then
          # Add the -S flag to actually trigger the GPG signature
          git commit -S -m "chore: increment build number for release ${{ github.ref_name }} [skip ci]"
          git push origin master
        fi
        
    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BASE_TAG=${{ github.ref_name }}
        BUILD_NUM=$(cat build_number.txt)
        FULL_VERSION="${BASE_TAG}.${BUILD_NUM}"
        
        git tag -d "$BASE_TAG" || true
        git push origin --delete "$BASE_TAG" || true
        
        gh release create "$FULL_VERSION" build/MineSweeperWin32.exe \
          --title "MineSweeper $FULL_VERSION" \
          --generate-notes
