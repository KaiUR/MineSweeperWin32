name: MinGW-w64 Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Commit and Push Updated Build Number
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@://github.com"
        
        # Switch to master branch to push the update
        git checkout master
        
        git add build_number.txt
        
        # Only commit if CMake actually changed the file
        if ! git diff --staged --quiet; then
          git commit -m "chore: increment build number for release ${{ github.ref_name }} [skip ci]"
          git push origin master
        fi
        
    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/MineSweeper.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
